  <circle cx="8" cy="8" r="2" fill="#e4ece6"/>
  <!-- north -->
  <rect x="6" y="1" fill="#3d6b4f"/><rect x="7" y="0" fill="#3d6b4f"/><rect x="8" y="1" fill="#3d6b4f"/>
  <rect x="7" y="1" fill="#3d6b4f"/><rect x="7" y="2" fill="#1a2e22"/><rect x="7" y="3" fill="#1a2e22"/>
  <!-- south -->
  <rect x="6" y="13" fill="#3d6b4f"/><rect x="7" y="14" fill="#3d6b4f"/><rect x="8" y="13" fill="#3d6b4f"/>
  <rect x="7" y="13" fill="#3d6b4f"/><rect x="7" y="12" fill="#1a2e22"/><rect x="7" y="11" fill="#1a2e22"/>
  <!-- east -->
  <rect x="13" y="6" fill="#3d6b4f"/><rect x="14" y="7" fill="#3d6b4f"/><rect x="13" y="8" fill="#3d6b4f"/>
  <rect x="12" y="7" fill="#1a2e22"/><rect x="11" y="7" fill="#1a2e22"/>
