  <rect x="2" y="6" fill="#3d6b4f"/><rect x="1" y="7" fill="#3d6b4f"/><rect x="2" y="8" fill="#3d6b4f"/>
  <rect x="3" y="7" fill="#1a2e22"/><rect x="4" y="7" fill="#1a2e22"/>
  <!-- diagonals -->
  <rect x="11" y="2" fill="#3d6b4f"/><rect x="12" y="1" fill="#3d6b4f"/><rect x="12" y="2" fill="#3d6b4f"/>
  <rect x="11" y="3" fill="#1a2e22"/><rect x="10" y="3" fill="#3d6b4f"/>
  <rect x="3" y="2" fill="#3d6b4f"/><rect x="2" y="1" fill="#3d6b4f"/><rect x="2" y="2" fill="#3d6b4f"/>
  <rect x="3" y="3" fill="#1a2e22"/><rect x="4" y="3" fill="#3d6b4f"/>
  <rect x="11" y="12" fill="#3d6b4f"/><rect x="12" y="13" fill="#3d6b4f"/><rect x="12" y="12" fill="#3d6b4f"/>
  <rect x="11" y="11" fill="#1a2e22"/><rect x="10" y="11" fill="#3d6b4f"/>
  <rect x="3" y="12" fill="#3d6b4f"/><rect x="2" y="13" fill="#3d6b4f"/><rect x="2" y="12" fill="#3d6b4f"/>
  <rect x="3" y="11" fill="#1a2e22"/><rect x="4" y="11" fill="#3d6b4f"/>
</svg>
