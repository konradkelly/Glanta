services:
  postgres:
    image: postgres:16-alpine
    container_name: glanta-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glanta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glanta}
      POSTGRES_DB: ${POSTGRES_DB:-glanta}
    volumes:
      - glanta_pg_data:/var/lib/postgresql/data
      - ./apps/api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glanta} -d ${POSTGRES_DB:-glanta}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  glanta_pg_data: